<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <title>GitHub Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="container">
    <div class="header">
      <div class="header-left"></div>
      <h1 class="header-title">GitHub Analyzer</h1>
      <button id="toggle_bt">🌙</button>
    </div>

    <div class="tabs">
      <button class="tab-button active" data-tab="user">User Info</button>
      <button class="tab-button" data-tab="trending">Trending</button>
    </div>

    <!-- USER TAB -->
    <section id="tab-user" class="tab-content active">
      <form id="div_search">
        <input type="search" id="input_search" placeholder="Enter GitHub username" autocomplete="off" required>
        <button type="submit" id="bt_search">Search</button>
      </form>

      <section id="user_card" class="card_user card card-hidden"></section>
      <section id="repo_card" class="card card-hidden"></section>
    </section>


    <!-- TRENDING TAB -->
    <section id="tab-trending" class="tab-content">
      <section id="trending_card" class="card">
        <div class="trending-header">
          <h3>🔥 Trending Repositories</h3>
          <div class="trending-filters">
            <button data-range="week">7 Days</button>
            <button data-range="month">30 Days</button>
            <button data-range="all" class="active">All Time</button>
          </div>
        </div>

        <ol id="trending_list"></ol>

        <button id="load_more_trending" class="load-more card-hidden"> Load more </button>
      </section>
    </section>
    
  </main>

  <footer>
    <p>© 2026 heoconngoc</p>
  </footer>

  <script type="module" src="src/main.js"></script>
</body>

</html>
